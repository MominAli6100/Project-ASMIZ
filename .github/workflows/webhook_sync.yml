name: Webhook Market Sync

on:
  repository_dispatch:
    types: [cron_sync]

jobs:
  market_sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install yfinance duckdb pandas numpy requests

      - name: Run Market Data Scraper
        run: |
          python data_ingestion/yfinance_scraper.py

      - name: Re-calculate AI Features
        run: |
          python feature_engineering/build_features.py

      - name: Execute Telegram Engine
        run: |
          python notification_engine.py
