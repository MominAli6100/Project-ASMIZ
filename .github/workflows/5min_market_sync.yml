name: 5-Minute Market Sync

on:
  schedule:
    # Run every 5 minutes on trading days (Monday to Friday)
    - cron: '*/5 * * * 1-5'
  workflow_dispatch: # Allow manual trigger

jobs:
  sync-market-data:
    runs-on: ubuntu-latest

    env:
      MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_TOKEN }}
      TWILIO_ACCOUNT_SID: ${{ secrets.TWILIO_ACCOUNT_SID }}
      TWILIO_AUTH_TOKEN: ${{ secrets.TWILIO_AUTH_TOKEN }}
      TWILIO_FROM_NUMBER: ${{ secrets.TWILIO_FROM_NUMBER }}
      TWILIO_TO_NUMBER: ${{ secrets.TWILIO_TO_NUMBER }}

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run YFinance Scraper
      run: python data_ingestion/yfinance_scraper.py

    - name: Run FRED Scraper
      run: python data_ingestion/fred_scraper.py

    - name: Run Feature Engineering
      run: python feature_engineering/build_features.py

    - name: Run Whale Tracking Scraper
      run: python data_ingestion/whale_scraper.py

    - name: Run WhatsApp Notification Engine
      run: python notification_engine.py
