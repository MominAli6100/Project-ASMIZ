name: Daily AI Training Pipeline

on:
  schedule:
    # Run at 5:00 PM EST (21:00 UTC) every Monday through Friday
    - cron: '0 21 * * 1-5'
  workflow_dispatch: # Allow manual trigger

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    env:
      MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_TOKEN }}

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Market Data Ingestion
      run: python data_ingestion/yfinance_scraper.py

    - name: Run Feature Engineering
      run: python feature_engineering/build_features.py

    - name: Train XGBoost Models
      run: python models/train_xgboost.py
